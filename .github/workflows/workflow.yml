name: Workflow
run-name: "${{ github.event.repository.name }}@${{ github.ref_name }}#${{ github.run_number }} - ${{ github.event.head_commit.message }}"

on:
  push:
    branches: [ master, "v[0-9]+.[0-9]+" ]

permissions: { contents: read }
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Version
    uses: webitel/reusable-workflows/.github/workflows/_version.yml@v2
    with:
      development-branch: ${{ github.event.repository.default_branch }}
      triggered-branch: ${{ github.ref_name }}
      arch: ${{ vars.BUILD_ARCH }}
      codename: ${{ vars.DEB_CODENAME }}

  freeswitch-version:
    name: Freeswitch version
    runs-on: [ arc-c-runner-set ]
    outputs:
      version: ${{ steps.fs_version.outputs.FREESWITCH_VERSION }}

    steps:
      - name: Get Freeswitch version
        id: fs_version
        run: |
          FREESWITCH_VERSION=$(freeswitch -version | cut -f 3 -d " " | cut -f 1 -d "-")
          echo "FREESWITCH_VERSION=$FREESWITCH_VERSION" >> $GITHUB_OUTPUT

  compile:
    name: Build
    needs: [ version, freeswitch-version ]
    strategy:
      matrix:
        arch: ${{ fromJSON(needs.version.outputs.arch-matrix) }}

    uses: webitel/reusable-workflows/.github/workflows/clang-build.yml@v2
    with:
      arch: ${{ matrix.arch }}
      version: ${{ needs.version.outputs.version }}
      version-build: ${{ github.run_number }}
      version-metadata: freeswitch${{ needs.freeswitch-version.outputs.version }}
      prerelease: ${{ github.event.repository.default_branch == github.ref_name && 'dev' || '' }}
      package-name: freeswitch-mod-grpc
      package-description: ${{ github.event.repository.description }}
      package-contents: src=mod_grpc.so dst=/usr/lib/freeswitch/mod/mod_grpc.so type=file
      upload-artifact-pattern: build/mod_grpc.so
      scripts: |
        postinstall: deploy/debian/postinst.sh

      args: |
        -DMOD_BUILD_VERSION="${{ github.run_number }}, commit: ${{ github.sha }}/${{ github.ref_name }}" \
        -DFREESWITCH_INCLUDE_DIR=/usr/include/freeswitch \
        -DINSTALL_MOD_DIR=/usr/local/freeswitch/mod \
        -DCMAKE_BUILD_TYPE=Release

  deploy:
    name: Deploy
    needs: [ version, compile ]
    uses: webitel/reusable-workflows/.github/workflows/_deploy.yml@v2
    secrets: inherit
    with:
      repository-environment: ${{ github.event.repository.default_branch == github.ref_name && 'acceptance' || format('{0}-releases', needs.version.outputs.version) }}
      deb-package-pattern: "freeswitch-mod-grpc*.deb"

  publish:
    name: Publish
    needs: [ version, compile, deploy ]
    if: always() && !cancelled() && needs.compile.result == 'success' && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
    strategy:
      matrix:
        arch: ${{ fromJSON(needs.version.outputs.arch-matrix) }}
        codename: ${{ fromJSON(needs.version.outputs.codename-matrix) }}

    uses: webitel/reusable-workflows/.github/workflows/_publish-deb.yml@v2
    secrets: inherit
    with:
      arch: ${{ matrix.arch }}
      repository-environment: ${{ github.event.repository.default_branch == github.ref_name && 'acceptance' || format('{0}-releases', needs.version.outputs.version) }}
      deb-package-pattern: "freeswitch-mod-grpc*.deb"
      deb-component: ${{ github.event.repository.default_branch == github.ref_name && 'dev' || format('{0}-releases', needs.version.outputs.version) }}
      deb-codename: ${{ matrix.codename }}
      deb-s3-bucket-name: ${{ vars.DEB_S3_BUCKET_NAME }}
      deb-s3-bucket-region: ${{ vars.DEB_S3_DEFAULT_REGION }}
      deb-s3-endpoint: ${{ vars.DEB_S3_ENDPOINT }}
      deb-s3-force-path-style: ${{ vars.DEB_S3_FORCE_PATH_STYLE == 'true' }}

  release:
    name: Release
    needs: [ version, publish ]
    if: github.event.repository.default_branch != github.ref_name && needs.publish.result == 'success'
    uses: webitel/reusable-workflows/.github/workflows/_release.yml@v2
    permissions: { contents: write }
    with:
      tag: ${{ format('{0}-{1}', needs.version.outputs.version, github.run_number) }}
      tag-target-commitish: ${{ github.sha }}
